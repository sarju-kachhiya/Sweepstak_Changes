<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusive Offer</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: #FBFBFB;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
        }

        .offer-container {
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            overflow: hidden;
            text-align: center;
            padding: 20px;
        }

        .offer-ribbon {
            background: #33B5F7;
            color: white;
            padding: 15px 30px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 10px;
        }

        .offer-image {
            width: 200px;
            height: 200px;
            object-fit: cover;
            margin: 20px auto;
            border: 5px solid #33B5F7;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            border-radius: 30px; /* Rounded-square shape */
        }

        .offer-title {
            font-size: 26px;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
        }

        .offer-text {
            color: #777;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .btn-custom {
            padding: 12px 35px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            color: white;
            text-transform: uppercase;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-accept {
            background: #33B5F7;
        }

        .btn-accept:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(51, 181, 247, 0.5);
        }

        .btn-decline {
            background: #777;
        }

        .btn-decline:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(119, 119, 119, 0.5);
        }
    </style>
</head>
<body>
    <div class="offer-container">
        <div class="offer-ribbon">Limited Time Deal!</div>
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?ixlib=rb-4.0.3&auto=format&fit=crop&w=450&q=80" alt="Offer Image" class="offer-image">
        <div class="offer-title">Grab Your Discount Now</div>
        <p class="offer-text">
            Enjoy 40% off your first order with our premium plan. Don’t miss out—this deal won’t last long!
        </p>
        <div class="d-flex justify-content-center gap-3">
            <button class="btn btn-custom btn-accept" onclick="handleAccept()">Accept</button>
            <button class="btn btn-custom btn-decline" onclick="handleDecline()">Decline</button>
        </div>
    </div>
</body>
</html>
