<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offer Wall</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <style>
        body {
    background-color: #f0f2f5;
    font-family: 'Poppins', sans-serif;
}

/* Category Tabs */
.nav-pills .nav-link {
    background: linear-gradient(45deg, #8a4af3, #ff6b6b);
    color: white;
    border-radius: 20px;
    margin: 0 10px;
    padding: 8px 20px;
    transition: all 0.3s ease;
}

.nav-pills .nav-link.active {
    background: linear-gradient(45deg, #ff6b6b, #ffcc00);
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
}

/* Offer Cards */
.card {
    background: linear-gradient(135deg,  #47A3CB, #AFD9EF);
    border: none;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    transition: transform 0.3s ease;
}

.card:hover {
    transform: translateY(-5px);
}

.card-body {
    color: white;
}

.card-title {
    font-size: 1.2rem;
    margin-bottom: 5px;
}

.card-text {
    font-size: 0.9rem;
    opacity: 0.9;
}

.btn-warning {
    background-color: #ffcc00;
    border: none;
    color: #333;
    font-weight: bold;
    border-radius: 10px;
    padding: 5px 15px;
}

.btn-warning:hover {
    background-color: #ffdb4d;
}

/* Responsive Adjustments */
@media (max-width: 768px) {
    .nav-pills .nav-link {
        margin: 5px;
        padding: 6px 15px;
    }
}
    </style>
</head>
<body>
    <div class="container my-5">
        <!-- Category Tabs -->
        <ul class="nav nav-pills mb-4 justify-content-center" id="categoryTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" data-category="all">All</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-category="games">Games</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-category="surveys">Surveys</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-category="apps">Apps</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-category="trials">Trials</button>
            </li>
        </ul>

        <!-- Offer Grid -->
        <div class="row row-cols-1 row-cols-md-2 g-4" id="offerGrid">
            <!-- Offer 1 -->
            <div class="col offer" data-category="games">
                <div class="card h-100">
                    <div class="card-body d-flex align-items-center">
                        <img src="https://via.placeholder.com/100" alt="Offer Image" class="me-3">
                        <div>
                            <h5 class="card-title"><b>Play Galaxy Quest</b></h5>
                            <p class="card-text">Earn 100 Coins</p>
                            <a href="#" class="btn btn-warning">Claim Now</a>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Offer 2 -->
            <div class="col offer" data-category="surveys">
                <div class="card h-100">
                    <div class="card-body d-flex align-items-center">
                        <img src="https://via.placeholder.com/100" alt="Offer Image" class="me-3">
                        <div>
                            <h5 class="card-title">Take a Quick Survey</h5>
                            <p class="card-text">Earn 50 Points</p>
                            <a href="#" class="btn btn-warning">Claim Now</a>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Offer 3 -->
            <div class="col offer" data-category="apps">
                <div class="card h-100">
                    <div class="card-body d-flex align-items-center">
                        <img src="https://via.placeholder.com/100" alt="Offer Image" class="me-3">
                        <div>
                            <h5 class="card-title">Download App Z</h5>
                            <p class="card-text">Earn 75 Coins</p>
                            <a href="#" class="btn btn-warning">Claim Now</a>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Offer 4 -->
            <div class="col offer" data-category="trials">
                <div class="card h-100">
                    <div class="card-body d-flex align-items-center">
                        <img src="https://via.placeholder.com/100" alt="Offer Image" class="me-3">
                        <div>
                            <h5 class="card-title">Start a Free Trial</h5>
                            <p class="card-text">Earn 120 Points</p>
                            <a href="#" class="btn btn-warning">Claim Now</a>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Offer 5 -->
            <div class="col offer" data-category="games">
                <div class="card h-100">
                    <div class="card-body d-flex align-items-center">
                        <img src="https://via.placeholder.com/100" alt="Offer Image" class="me-3">
                        <div>
                            <h5 class="card-title">Watch Ad Video</h5>
                            <p class="card-text">Earn 30 Coins</p>
                            <a href="#" class="btn btn-warning">Claim Now</a>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Offer 6 -->
            <div class="col offer" data-category="surveys">
                <div class="card h-100">
                    <div class="card-body d-flex align-items-center">
                        <img src="https://via.placeholder.com/100" alt="Offer Image" class="me-3">
                        <div>
                            <h5 class="card-title">Complete Quiz</h5>
                            <p class="card-text">Earn 60 Points</p>
                            <a href="#" class="btn btn-warning">Claim Now</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS and Popper.js -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
    <!-- Custom JS -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
    const tabs = document.querySelectorAll('#categoryTabs .nav-link');
    const offers = document.querySelectorAll('.offer');

    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            // Remove active class from all tabs
            tabs.forEach(t => t.classList.remove('active'));
            // Add active class to clicked tab
            tab.classList.add('active');

            const category = tab.getAttribute('data-category');

            // Filter offers
            offers.forEach(offer => {
                const offerCategory = offer.getAttribute('data-category');
                if (category === 'all' || offerCategory === category) {
                    offer.style.display = 'block';
                } else {
                    offer.style.display = 'none';
                }
            });
        });
    });
});
    </script>
</body>
</html>
